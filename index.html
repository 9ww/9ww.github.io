<!DOCTYPE html>
<body>
    <button id="btn">Load Library</button>
    <button id="clear" onclick="localStorage.removeItem('spotify_songs'); location.reload()">Clear Cache</button>
    <div id="status"></div>
    <ul id="list"></ul>

    <script type="module">
        import { SpotifyApi } from 'https://esm.sh/@spotify/web-api-ts-sdk';
        
        const sdk = SpotifyApi.withUserAuthorization("d0ceeb9b9d8045ee8d3edca5ba229eb3", "http://localhost:8000", ["playlist-read-private"]);
        const btn = document.getElementById("btn");
        const log = (msg) => document.getElementById("status").innerText = msg;

        // 1. The Serial Fetcher (Only runs if Cache is empty)
        async function drainPlaylists() {
            log("Fetching from API...");
            const db = [];
            let pOff = 0, pMore = true;

            while (pMore) {
                const pPage = await sdk.currentUser.playlists.playlists(50, pOff);
                
                for (const p of pPage.items) {
                    log(`Scraping: ${p.name}`);
                    let tOff = 0, tMore = true;
                    
                    while (tMore) {
                        // Fetch Song + Album + Artist
                        const tPage = await sdk.playlists.getPlaylistItems(p.id, "US", "items(track(name,album(name),artists(name)))", 100, tOff);
                        
                        // Flatten and Store
                        db.push(...tPage.items.map(i => ({
                            pl: p.name,                          // Playlist
                            t:  i.track?.name || "Unknown",      // Track
                            ar: i.track?.artists[0]?.name || "", // Artist
                            al: i.track?.album?.name || ""       // Album
                        })));

                        tMore = tPage.items.length === 100;
                        tOff += 100;
                    }
                }
                pMore = !!pPage.next;
                pOff += 50;
            }
            return db;
        }

        // 2. Render Helper
        const render = (data) => {
            document.getElementById("list").innerHTML = data
                .map(i => `<li><b>${i.t}</b> by ${i.ar} <small>[${i.al}] in <i>${i.pl}</i></small></li>`)
                .join('');
            log(`Loaded ${data.length} songs.`);
        };

        // 3. Main Execution
        (async () => {
            if (await sdk.getAccessToken()) {
                btn.onclick = async () => {
                    // A. Check Cache First
                    const cached = localStorage.getItem("spotify_songs");
                    if (cached) {
                        log("Found in Cache! Rendering...");
                        render(JSON.parse(cached));
                    } else {
                        // B. If empty, Fetch -> Save -> Render
                        const data = await drainPlaylists();
                        try {
                            localStorage.setItem("spotify_songs", JSON.stringify(data));
                        } catch (e) { console.warn("Storage Full", e); }
                        render(data);
                    }
                };
                
                // Auto-run on redirect
                if (new URLSearchParams(location.search).get("code")) {
                    window.history.replaceState({}, null, "/");
                    btn.click();
                }
            } else {
                btn.onclick = () => sdk.authenticate();
            }
        })();
    </script>
</body>
