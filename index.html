<!DOCTYPE html>
<body>
    <button id="btn">Login & Fetch All Songs</button>
    <div id="status"></div>
    <ul id="list"></ul>

    <script type="module">
        import { SpotifyApi } from 'https://esm.sh/@spotify/web-api-ts-sdk';
        
        // 1. Setup: Replace Client ID. Redirect URI must match Dashboard.
        const sdk = SpotifyApi.withUserAuthorization("YOUR_CLIENT_ID", "http://localhost:8000", ["playlist-read-private"]);
        const btn = document.getElementById("btn");
        const log = (msg) => document.getElementById("status").innerText = msg;

        // 2. The "One-at-a-Time" Engine
        async function drainPlaylists() {
            log("Starting Serial Fetch...");
            const songs = [];
            let pOff = 0, pMore = true;

            // Outer Loop: Playlists (Batch 50)
            while (pMore) {
                const pPage = await sdk.currentUser.playlists.playlists(50, pOff);
                
                // Serial Loop: Process one playlist completely before starting next
                for (const p of pPage.items) {
                    log(`Scraping: ${p.name}`);
                    let tOff = 0, tMore = true;
                    
                    // Inner Loop: Tracks (Batch 100)
                    while (tMore) {
                        const tPage = await sdk.playlists.getPlaylistItems(p.id, "US", "items(track(name))", 100, tOff);
                        songs.push(...tPage.items.map(i => i.track ? i.track.name : "Unknown"));
                        
                        // Throttle Logic: Stop if page is not full, else grab next page
                        tMore = tPage.items.length === 100;
                        tOff += 100;
                    }
                }
                // Check if more playlists exist
                pMore = !!pPage.next;
                pOff += 50;
            }
            return songs;
        }

        // 3. Execution Logic
        (async () => {
            if (await sdk.getAccessToken()) {
                btn.onclick = async () => {
                    const all = await drainPlaylists();
                    log(`Done! Found ${all.length} songs.`);
                    document.getElementById("list").innerHTML = all.map(s => `<li>${s}</li>`).join('');
                };
                // Auto-click if returning from Auth
                if (new URLSearchParams(location.search).get("code")) {
                    window.history.replaceState({}, null, "/");
                    btn.click();
                }
            } else {
                btn.onclick = () => sdk.authenticate();
            }
        })();
    </script>
</body>
